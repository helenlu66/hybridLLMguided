<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Novelty icon">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#0b1220"/>
			<stop offset="100%" stop-color="#1e2d52"/>
		</linearGradient>
		<linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#22d3ee"/>
			<stop offset="100%" stop-color="#38bdf8"/>
		</linearGradient>
	</defs>

	<rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

	<!-- Stable prior state: ring -->
	<circle cx="30" cy="34" r="12" fill="none" stroke="#93c5fd" stroke-width="4" opacity="0.9"/>

	<!-- Novel element: shifted core -->
	<circle cx="36" cy="28" r="6" fill="url(#core)"/>

	<!-- Novelty spark -->
	<path d="M47 12l1.7 4.3L53 18l-4.3 1.7L47 24l-1.7-4.3L41 18l4.3-1.7z" fill="#facc15"/>

	<!-- Accent point -->
